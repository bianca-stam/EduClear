services:
  api-gateway:
    image: bianca0stam/gateway-educlear:latest
    ports:
      - "80:8080"
    environment:
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
    restart: always

  usuario-service:
    image: bianca0stam/usuario-service:latest
    environment:
      DB_HOST: ${AWS_RDS_ENDPOINT}
      DB_PORT: 3306
      SPRING_DATASOURCE_URL: jdbc:mariadb://${AWS_RDS_ENDPOINT}:3306/dbeduclear?sslMode=trust
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
    restart: always

  curso-service:
    image: bianca0stam/curso-service:latest
    environment:
      DB_HOST: ${AWS_RDS_ENDPOINT}
      DB_PORT: 3306
      SPRING_DATASOURCE_URL: jdbc:mariadb://${AWS_RDS_ENDPOINT}:3306/dbeduclear?sslMode=trust
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
    restart: always

  asignatura-service:
    image: bianca0stam/asignatura-service:latest
    environment:
      DB_HOST: ${AWS_RDS_ENDPOINT}
      DB_PORT: 3306
      SPRING_DATASOURCE_URL: jdbc:mariadb://${AWS_RDS_ENDPOINT}:3306/dbeduclear?sslMode=trust
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
    restart: always

  materiales-service:
    image: bianca0stam/materiales-service:latest
    environment:
      DB_HOST: ${AWS_RDS_ENDPOINT}
      DB_PORT: 3306
      SPRING_DATASOURCE_URL: jdbc:mariadb://${AWS_RDS_ENDPOINT}:3306/dbeduclear?sslMode=trust
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
    restart: always

  frontend:
    image: bianca0stam/educlear-frontend:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always