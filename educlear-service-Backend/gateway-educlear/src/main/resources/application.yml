server:
  port: 8080

spring:
  application:
    name: gateway-educlear
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: usuario-service
          uri: http://localhost:8081 # Update this to point to your user service or use Eureka (lb://usuario-service)
          predicates:
            - Path=/api/usuarios/**
        - id: curso-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/cursos/**
        - id: asignatura-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/asignaturas/**
        - id: materiales-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/materiales/**

# Enable actuator endpoints for monitoring if needed
management:
  endpoints:
    web:
      exposure:
        include: "*"
