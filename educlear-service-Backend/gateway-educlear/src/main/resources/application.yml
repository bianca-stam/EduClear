server:
  port: 8080

spring:
  application:
    name: gateway-educlear
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # Login - SIN filtro de autenticación (es pública)
        - id: usuario-login
          uri: http://usuario-service:8081
          predicates:
            - Path=/api/usuarios/login

        # Usuarios - CON filtro de autenticación
        - id: usuario-service
          uri: http://usuario-service:8081
          predicates:
            - Path=/api/usuarios/**
          filters:
            - AuthFilter

        # Cursos - CON filtro
        - id: curso-service
          uri: http://curso-service:8082
          predicates:
            - Path=/api/cursos/**
          filters:
            - AuthFilter

        # Asignaturas - CON filtro
        - id: asignatura-service
          uri: http://asignatura-service:8083
          predicates:
            - Path=/api/asignaturas/**
          filters:
            - AuthFilter

        # Matriculas - CON filtro (dentro de asignatura-service)
        - id: matricula-service
          uri: http://asignatura-service:8083
          predicates:
            - Path=/api/matriculas/**
          filters:
            - AuthFilter

        # Materiales - CON filtro
        - id: materiales-service
          uri: http://materiales-service:8084
          predicates:
            - Path=/api/materiales/**
          filters:
            - AuthFilter

        # Temas (ruta corta) - CON filtro
        - id: temas-service
          uri: http://materiales-service:8084
          predicates:
            - Path=/api/temas/**
          filters:
            - AuthFilter
