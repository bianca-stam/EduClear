services:
  backend:
    build:
      context: ./educlear-app
      dockerfile: Dockerfile
    container_name: educlear-backend
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./educlear-frontend
      dockerfile: Dockerfile
    container_name: educlear-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
