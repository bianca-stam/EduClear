services:
  mariadb:
    image: mariadb:11.8
    container_name: educlear-mariadb-dev
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: educlear
      MARIADB_USER: educlear
      MARIADB_PASSWORD: educlear
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./educlear-app
      dockerfile: Dockerfile.dev
    container_name: educlear-backend-dev
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: C:/Users/bianca/EduClear/educlear-app
        target: /app
      - maven_cache:/root/.m2
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/educlear
      SPRING_DATASOURCE_USERNAME: educlear
      SPRING_DATASOURCE_PASSWORD: educlear
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./educlear-frontend
      dockerfile: Dockerfile.dev
    container_name: educlear-frontend-dev
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - type: bind
        source: C:/Users/bianca/EduClear/educlear-frontend
        target: /app
      - frontend_node_modules:/app/node_modules
      - frontend_angular_cache:/app/.angular
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
  frontend_angular_cache:
  maven_cache:
  mariadb_data:
