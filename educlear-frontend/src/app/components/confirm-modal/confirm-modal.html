@if (isOpen) {
    <div class="modal-overlay">
        <div class="modal-content">
            <h3>{{ title }}</h3>
            <p>{{ message }} @if (itemName) { <strong>{{ itemName }}</strong> }?</p>
            <div class="modal-actions">
                <button class="btn btn-primary" (click)="onCancel()">{{ cancelText }}</button>
                <button class="btn btn-secondary" (click)="onConfirm()">{{ confirmText }}</button>
            </div>
        </div>
    </div>
}
