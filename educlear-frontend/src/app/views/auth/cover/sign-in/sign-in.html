<div class="auth-box p-0 w-100">
    <div class="row w-100 g-0">
        <div class="col-md-auto">
            <div class="card auth-box-form border-0 mb-0">
                <div
                    class="card-body min-vh-100 d-flex flex-column justify-content-center"
                >
                    <div class="auth-brand mb-0 text-center">
                        <a routerLink="/" class="logo-dark">
                            <img
                                src="assets/images/logo-black.png"
                                alt="dark logo"
                                height="28"
                            />
                        </a>
                        <a routerLink="/" class="logo-light">
                            <img
                                src="assets/images/logo.png"
                                alt="logo"
                                height="28"
                            />
                        </a>
                    </div>

                    <div class="mt-auto">
                        <form [formGroup]="loginForm" (ngSubmit)="logIn()" class="mt-4">
                            <div class="mb-3">
                                <label for="userEmail" class="form-label"
                                    >Correo Electronico
                                </label>
                                <div class="app-search">
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="userEmail"
                                        required
                                        formControlName="correo"
                                        [class.is-invalid]="form.correo.invalid && form.correo.touched"
                                    />
                                    <lucide-angular
                                        [img]="LucideCircleUser"
                                        class="app-search-icon text-muted"
                                    />
                                </div>
                                <div class="text-secondary small mt-1" [style.visibility]="(form.correo.invalid && form.correo.touched) ? 'visible' : 'hidden'">
                                    @if (form.correo.errors?.['email']) {
                                        El formato del correo es inválido
                                    } @else {
                                        El correo es requerido
                                    }
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="userPassword" class="form-label"
                                    >Contraseña
                                </label>
                                <div class="app-search">
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="userPassword"
                                        required
                                        formControlName="password"
                                        [class.is-invalid]="form.password.invalid && form.password.touched"
                                    />
                                      <lucide-angular
                                        [img]="LucideKeyRound"
                                        class="app-search-icon text-muted"
                                    />
                                   
                                </div>
                                <div class="text-secondary small mt-1 mb-2" [style.visibility]="(form.password.invalid && form.password.touched) ? 'visible' : 'hidden'">
                                    La contraseña es requerida
                                </div>
                            </div>

                            <div
                                class="d-flex justify-content-between align-items-center mb-3">
                            </div>

                            <div class="d-grid">
                                <button
                                    type="submit"
                                    class="btn btn-primary fw-bold py-2"
                                    [disabled]="isLoading() || loginForm.invalid"
                                >
                                    @if (isLoading()) {
                                        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                        Iniciando sesión...
                                    } @else {
                                        Iniciar Sesión
                                    }
                                </button>
                            </div>
                        </form>
                    </div>

                    <p class="text-center mt-auto mb-0" style="min-height: 24px;">
                        @if ( errorMessage()) {
                        <span class="text-secondary fw-semibold">{{errorMessage()}}</span>
                        }
                    </p>
                    
                </div>

                
            </div>
        </div>
        <div class="col">
            <div
                class="h-100 position-relative card-side-img rounded-0 overflow-hidden"
            >
                <div
                    class="p-4 card-img-overlay auth-overlay d-flex align-items-end justify-content-center"
                ></div>
            </div>
        </div>
    </div>
</div>
