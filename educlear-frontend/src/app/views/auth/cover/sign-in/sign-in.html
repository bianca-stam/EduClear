<div class="auth-box p-0 w-100">
    <div class="row w-100 g-0">
        <div class="col-md-auto">
            <div class="card auth-box-form border-0 mb-0">
                <div
                    class="card-body min-vh-100 d-flex flex-column justify-content-center"
                >
                    <div class="auth-brand mb-0 text-center">
                        <a routerLink="/" class="logo-dark">
                            <img
                                src="assets/images/logo-black.png"
                                alt="dark logo"
                                height="28"
                            />
                        </a>
                        <a routerLink="/" class="logo-light">
                            <img
                                src="assets/images/logo.png"
                                alt="logo"
                                height="28"
                            />
                        </a>
                    </div>

                    <div class="mt-auto">
                        <form class="mt-4">
                            <div class="mb-3">
                                <label for="userEmail" class="form-label"
                                    >Email address
                                </label>
                                <div class="app-search">
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="userEmail"
                                        required
                                    />
                                    <lucide-angular
                                        [img]="LucideCircleUser"
                                        class="app-search-icon text-muted"
                                    />
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="userPassword" class="form-label"
                                    >Password
                                </label>
                                <div class="app-search">
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="userPassword"
                                        required
                                    />
                                      <lucide-angular
                                        [img]="LucideKeyRound"
                                        class="app-search-icon text-muted"
                                    />
                                   
                                </div>
                            </div>

                            <div
                                class="d-flex justify-content-between align-items-center mb-3">
                            </div>

                            <div class="d-grid">
                                <button
                                    type="submit"
                                    class="btn btn-primary fw-bold py-2"
                                >
                                    Sign In
                                </button>
                            </div>
                        </form>
                    </div>

                    <p class="text-center text-muted mt-auto mb-0">
                        ©
                        {{currentYear}}
                        UBold — by <span class="fw-semibold">{{credits.name}}</span>
                    </p>
                </div>
            </div>
        </div>
        <div class="col">
            <div
                class="h-100 position-relative card-side-img rounded-0 overflow-hidden"
            >
                <div
                    class="p-4 card-img-overlay auth-overlay d-flex align-items-end justify-content-center"
                ></div>
            </div>
        </div>
    </div>
</div>
